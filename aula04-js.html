<!DOCTYPE html>
<html lang="pr-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        .grid{
            display: grid;
            grid-template-columns: repeat(2,1fr);
            gap: 10px;
        }
        .item{
            background-color: blue;
            color: white;
            padding: 20px;
            text-align: center;
            border-radius: 4px;
        }
        .item1{
            background-color: blue;
            color: white;
            padding: 250px;
            text-align: center;
            border-radius: 4px;
        }

    </style>
    <title>Aula04 - grid css</title>
</head>
<body>
     <div class="grid">
        <div class = "item1">1</div>
        <div class = "item">2</div>
        <div class = "item">3</div>
        <div class = "item">4</div>
        <div class = "item">5</div>
     </div>
</body>
</html>
